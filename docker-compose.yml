services:
  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      ORIGIN: https://${DOMAIN}
      DATABASE_PATH: /app/data/resolute-society.sqlite
      FEDERATION_URL: ${FEDERATION_URL:-}
    volumes:
      - app-data:/app/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:

networks:
  app-network:
    driver: bridge
